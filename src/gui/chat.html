<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2d2d2d;
            padding: 12px 20px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #61dafb;
        }

        .header-controls {
            display: flex;
            gap: 10px;
        }

        .header-controls button {
            background: #3c3c3c;
            border: 1px solid #4c4c4c;
            color: #d4d4d4;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .header-controls button:hover {
            background: #4c4c4c;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 800px;
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            line-height: 1.6;
        }

        .message.user {
            align-self: flex-end;
            background: #0e639c;
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background: #2d2d2d;
            border: 1px solid #3c3c3c;
        }

        .message.system {
            align-self: center;
            background: #3c3c3c;
            color: #888;
            font-size: 12px;
            text-align: center;
        }

        .message pre {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 8px;
        }

        .message pre code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
        }

        .input-container {
            background: #2d2d2d;
            padding: 16px;
            border-top: 1px solid #3c3c3c;
        }

        .input-container textarea {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 12px;
            color: #d4d4d4;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            max-height: 200px;
        }

        .input-container textarea:focus {
            outline: none;
            border-color: #61dafb;
        }

        .input-container textarea::placeholder {
            color: #656c71;
        }

        .input-container button {
            margin-top: 10px;
            background: #0e639c;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .input-container button:hover {
            background: #1177bb;
        }

        .input-container button:disabled {
            background: #3c3c3c;
            cursor: not-allowed;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #3c3c3c;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .model-selector select {
            background: #1e1e1e;
            border: 1px solid #4c4c4c;
            color: #d4d4d4;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #61dafb;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .scrollbar-v {
            scrollbar-width: thin;
            scrollbar-color: #4c4c4c #1e1e1e;
        }

        .scrollbar-v::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar-v::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .scrollbar-v::-webkit-scrollbar-thumb {
            background: #4c4c4c;
            border-radius: 4px;
        }

        .scrollbar-v::-webkit-scrollbar-thumb:hover {
            background: #5c5c5c;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Ollama Agent</h1>
        <div class="header-controls">
            <button id="closeBtn">Close Panel</button>
        </div>
    </div>

    <div class="chat-container scrollbar-v" id="chatContainer">
        <div class="message system">
            Ollama Agent is ready. Select a model and start chatting!
        </div>
    </div>

    <div class="model-selector">
        <label for="modelSelect">Model:</label>
        <select id="modelSelect">
            <option value="llama3.2">llama3.2</option>
            <option value="llama3.1">llama3.1</option>
            <option value="mistral">mistral</option>
            <option value="codellama">codellama</option>
        </select>
    </div>

    <div class="input-container">
        <textarea id="messageInput" placeholder="Ask Ollama anything... (Shift+Enter for new line, Enter to send)"></textarea>
        <button id="sendBtn" disabled>Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelSelect = document.getElementById('modelSelect');
        const closeBtn = document.getElementById('closeBtn');

        let conversationHistory = [];
        let isGenerating = false;

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isGenerating) return;

            const userMessage = { role: 'user', content: message };
            conversationHistory.push(userMessage);

            // Add user message to UI
            addMessage('user', message);
            messageInput.value = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;

            // Add loading indicator
            const loadingId = addLoading();

            try {
                const model = modelSelect.value;
                const serverUrl = 'http://localhost:11434';

                const response = await window.fetch(`${serverUrl}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model,
                        messages: conversationHistory,
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const assistantMessage = { role: 'assistant', content: data.message.content };
                conversationHistory.push(assistantMessage);

                // Remove loading and add response
                removeLoading(loadingId);
                addMessage('assistant', data.message.content);

            } catch (error) {
                removeLoading(loadingId);
                addMessage('system', `Error: ${error.message}. Make sure Ollama server is running at ${serverUrl}`);
            } finally {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(role: string, content: string) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            if (role === 'assistant') {
                messageDiv.innerHTML = parseMarkdown(content);
            } else {
                messageDiv.textContent = content;
            }

            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function addLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loading-' + Date.now();
            loadingDiv.innerHTML = '<span class="loading"></span>Thinking...';
            chatContainer.appendChild(loadingDiv);
            scrollToBottom();
            return loadingDiv.id;
        }

        function removeLoading(loadingId: string) {
            const loadingDiv = document.getElementById(loadingId);
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        function parseMarkdown(text: string) {
            // Basic markdown parsing
            let parsed = text
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/gim, '<pre><code>$1</code></pre>')
                .replace(/\n/gim, '<br>');

            return parsed;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        modelSelect.addEventListener('change', () => {
            updateSystemMessage();
        });

        closeBtn.addEventListener('click', () => {
            vscode.commands.executeCommand('vscode-ollama-agent.closePanel');
        });

        function updateSystemMessage() {
            const systemMessage = document.querySelector('.message.system');
            if (systemMessage) {
                systemMessage.textContent = `Model: ${modelSelect.value}. Start chatting!`;
            }
        }

        updateSystemMessage();
    </script>
</body>
</html>
